name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  # ─── Vérification syntaxique ──────────────────────────────────────────
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring
          coverage: none

      - name: Vérification syntaxique (php -l)
        run: |
          find src tests -name "*.php" -print0 \
            | xargs -0 -n1 php -l \
            | grep -v "^No syntax errors" \
            && echo "Des erreurs de syntaxe ont été trouvées." && exit 1 \
            || echo "Aucune erreur de syntaxe détectée."

  # ─── Tests unitaires ──────────────────────────────────────────────────
  tests:
    name: Tests — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, mbstring
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Installer les dépendances
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Lancer les tests
        run: vendor/bin/phpunit --testdox
        env:
          DATABASE_URL: sqlite::memory:

  # ─── Couverture de code (PHP 8.2 uniquement) ──────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP avec Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.2-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.2-

      - name: Installer les dépendances
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Générer le rapport de couverture
        run: |
          vendor/bin/phpunit \
            --coverage-text \
            --coverage-clover=coverage.xml
        env:
          DATABASE_URL: sqlite::memory:

      - name: Uploader le rapport (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
